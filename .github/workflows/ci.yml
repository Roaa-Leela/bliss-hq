name: CI
on:
  push: { branches: [ main, "claude/**" ] }
  pull_request:
jobs:
  web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: app } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: app/package-lock.json }
      - run: npm ci
      - run: npm run build
  database:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_PASSWORD: pg, POSTGRES_DB: bliss }
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Apply schema, RLS and seed
        env: { PGPASSWORD: pg }
        run: |
          psql -h localhost -U postgres -d bliss -v ON_ERROR_STOP=1 -c "create schema auth; create table auth.users(id uuid primary key); create or replace function auth.uid() returns uuid language sql stable as \$\$ select '00000000-0000-0000-0000-000000000000'::uuid \$\$;"
          psql -h localhost -U postgres -d bliss -v ON_ERROR_STOP=1 -f db/schema.sql
          psql -h localhost -U postgres -d bliss -v ON_ERROR_STOP=1 -f db/rls.sql
          psql -h localhost -U postgres -d bliss -v ON_ERROR_STOP=1 -f db/seed.sql
          psql -h localhost -U postgres -d bliss -c "select count(*) as items from checklist_items;"
